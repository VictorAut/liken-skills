name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: plugin | validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: tessl | install
        run: curl -fsSL https://get.tessl.io | sh

      - name: tessl | plugin lint
        run: tessl plugin lint .
