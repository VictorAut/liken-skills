name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: plugin | validate
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: tessl | setup
        uses: tesslio/setup-tessl@v2

      - name: tessl | plugin lint
        run: tessl plugin lint .
