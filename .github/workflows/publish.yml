name: Publish

on:
  workflow_dispatch:
    inputs:
      public:
        description: "Publish publicly (requires registry approval)"
        type: boolean
        default: false

jobs:
  publish:
    name: Publish plugin to Tessl
    runs-on: ubuntu-latest
    environment: tessl-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tessl CLI
        run: curl -fsSL https://get.tessl.io | sh

      - name: Lint plugin
        run: tessl plugin lint .

      - name: Publish plugin
        env:
          TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
        run: |
          tessl plugin publish . \
            --workspace liken \
            ${{ inputs.public && '--public' || '' }}
