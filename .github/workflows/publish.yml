name: publish

on:
  workflow_dispatch:

jobs:
  publish:
    name: plugin | publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: tessl | setup
        uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: tessl | plugin lint
        run: tessl plugin lint .

      - name: tessl | plugin publish
        run: tessl plugin publish
